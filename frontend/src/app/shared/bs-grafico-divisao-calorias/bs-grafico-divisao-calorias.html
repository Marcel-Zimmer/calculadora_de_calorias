<div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col md:flex-row items-center gap-8 h-full w-full relative overflow-hidden">
  
  <ng-container *ngIf="macros(); else semDados">
    <!-- Lado Esquerdo: Donut Chart SVG -->
    <div class="relative w-48 h-48 shrink-0">
      <svg viewBox="0 0 40 40" class="w-full h-full transform -rotate-90 scale-x-[-1]">
        <circle cx="20" cy="20" r="15.915" fill="transparent" stroke="#f1f5f9" stroke-width="5" />
        <circle cx="20" cy="20" r="15.915" fill="transparent" stroke="#f59e0b" stroke-width="5" 
          [attr.stroke-dasharray]="macros()!.percentualGorduras + ' 100'" 
          [attr.stroke-dashoffset]="-svgData()?.offsetGord!" />
        <circle cx="20" cy="20" r="15.915" fill="transparent" stroke="#fbbf24" stroke-width="5" 
          [attr.stroke-dasharray]="macros()!.percentualCarboidratos + ' 100'" 
          [attr.stroke-dashoffset]="-svgData()?.offsetCarb!" />
        <circle cx="20" cy="20" r="15.915" fill="transparent" stroke="#f43f5e" stroke-width="5" 
          [attr.stroke-dasharray]="macros()!.percentualProteinas + ' 100'" 
          [attr.stroke-dashoffset]="-svgData()?.offsetProt!" />
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
        <span class="text-xs font-black text-slate-400 uppercase tracking-tighter">Total</span>
        <span class="text-xl font-black text-slate-800">{{ macros()!.totalCalorias.toFixed(0) }}</span>
        <span class="text-[8px] font-bold text-slate-400 uppercase">kcal</span>
      </div>
    </div>

    <!-- Lado Direito: Legenda e Barra Empilhada -->
    <div class="flex-1 w-full space-y-6">
      <h3 class="text-xl font-black text-slate-800 tracking-tight">Divisão de Calorias</h3>
      <div class="space-y-3">
        <div class="flex justify-between items-center">
          <div class="flex items-center space-x-2"><div class="w-3 h-3 rounded-full bg-rose-500"></div><span class="text-sm font-bold text-slate-600">Proteínas</span></div>
          <span class="text-sm font-black text-slate-800">{{ macros()!.percentualProteinas.toFixed(1) }}%</span>
        </div>
        <div class="flex justify-between items-center">
          <div class="flex items-center space-x-2"><div class="w-3 h-3 rounded-full bg-amber-400"></div><span class="text-sm font-bold text-slate-600">Carboidratos</span></div>
          <span class="text-sm font-black text-slate-800">{{ macros()!.percentualCarboidratos.toFixed(1) }}%</span>
        </div>
        <div class="flex justify-between items-center">
          <div class="flex items-center space-x-2"><div class="w-3 h-3 rounded-full bg-orange-500"></div><span class="text-sm font-bold text-slate-600">Gorduras</span></div>
          <span class="text-sm font-black text-slate-800">{{ macros()!.percentualGorduras.toFixed(1) }}%</span>
        </div>
      </div>
      <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden flex shadow-inner">
        <div [style.width.%]="macros()!.percentualProteinas" class="h-full bg-rose-500 transition-all duration-1000"></div>
        <div [style.width.%]="macros()!.percentualCarboidratos" class="h-full bg-amber-400 transition-all duration-1000 border-x border-white/20"></div>
        <div [style.width.%]="macros()!.percentualGorduras" class="h-full bg-orange-500 transition-all duration-1000"></div>
      </div>
    </div>
  </ng-container>

  <ng-template #semDados>
    <div class="flex flex-col items-center justify-center w-full space-y-2 py-8 opacity-40">
        <span class="text-4xl">🍽️</span>
        <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Sem macros registrados</p>
    </div>
  </ng-template>

</div>
