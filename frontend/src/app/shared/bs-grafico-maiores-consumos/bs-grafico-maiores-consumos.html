<div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm h-full flex flex-col">
  <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">{{ titulo() }}</h3>
  <div class="space-y-3 flex-1 overflow-y-auto pr-1">
    @for (pico of picos(); track pico.legenda) {
      <div class="flex justify-between items-center">
        <span class="text-[10px] font-bold text-slate-500 uppercase">DIA {{ pico.legenda }}</span>
        <div class="flex-1 mx-4 h-1 bg-slate-50 rounded-full overflow-hidden">
          <div class="h-full transition-all duration-700" 
               [class]="corBarra()" 
               [style.width]="((pico.valor ?? pico.caloriasConsumidas ?? pico.caloriasGastas) / (maximo() || 1) * 100) + '%'"></div>
        </div>
        <span class="text-xs font-black text-slate-700 whitespace-nowrap">
            {{ pico.valor ?? pico.caloriasConsumidas ?? pico.caloriasGastas }} 
            <span class="text-[8px] font-normal text-slate-400">kcal</span>
        </span>
      </div>
    }
  </div>
</div>
