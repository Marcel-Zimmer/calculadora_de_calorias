<div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 w-full h-full flex flex-col animate-fade-in">
    <div class="flex justify-between items-center mb-8 shrink-0">
        <h3 class="font-black text-slate-800 text-lg">{{ titulo() }}</h3>
        
        <div class="flex items-center space-x-4 text-[10px] font-bold text-slate-400" *ngIf="pintarPorMeta()">
            <span class="flex items-center">
                <div class="w-3 h-3 rounded-md mr-2 bg-[#10b981]"></div> Na Meta
            </span>
            <span class="flex items-center">
                <div class="w-3 h-3 rounded-md mr-2 bg-[#f43f5e]"></div> Acima da Meta
            </span>
        </div>
    </div>

    <!-- Container das Barras com altura fixa garantida -->
    <div class="flex items-end justify-around h-[200px] px-2 border-b border-slate-100 pb-4">
        @for (item of dados(); track item.legenda) {
            <div class="flex-1 flex flex-col items-center group relative h-full justify-end min-w-[35px] mx-1">
                <!-- Valor no topo -->
                <span class="text-[9px] font-black text-slate-400 mb-1 whitespace-nowrap transition-colors group-hover:text-slate-600">
                    {{ item.valor }}
                </span>
                
                <!-- A Barra -->
                <div class="w-full max-w-[45px] rounded-t-xl transition-all duration-300 hover:scale-x-110 shadow-sm"
                     [style.background-color]="obterCorBarra(item.valor)"
                     [style.height]="obterAltura(item.valor)">
                </div>
                
                <!-- Legenda inferior -->
                <span class="absolute -bottom-7 text-[10px] font-bold text-slate-400 uppercase whitespace-nowrap">
                    {{ formatarLegenda(item.legenda) }}
                </span>
            </div>
        }
    </div>
</div>
