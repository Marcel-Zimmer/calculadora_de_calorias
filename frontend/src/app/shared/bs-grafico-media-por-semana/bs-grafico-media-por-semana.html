<div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm h-full flex flex-col">
  <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">{{ titulo() }}</h3>
  <div class="flex items-end justify-between h-32 px-2 space-x-2 flex-1">
    @for (sem of semanas(); track sem.nome) {
      <div class="flex-1 flex flex-col items-center relative h-full justify-end">
        <span class="text-[8px] font-black text-slate-400 mb-1">{{ sem.valor.toFixed(0) }}</span>
        <div class="w-full rounded-t-lg transition-all duration-500"
             [class]="corBarra() + ' ' + corHover()"
             [style.height]="(sem.valor / 3000 * 100) + '%'"></div>
        <span class="text-[8px] font-bold text-slate-400 mt-2 uppercase">{{ sem.nome }}</span>
      </div>
    }
  </div>
</div>
