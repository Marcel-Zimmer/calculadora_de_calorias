@if(mostrarModal()){
<div class="fixed inset-0 z-[60] bg-slate-900/40 backdrop-blur-sm animate-fade-in flex items-end sm:items-center justify-center p-4">

    <div class="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-lg p-8 shadow-2xl overflow-y-auto max-h-[90vh] relative animate-fade-in">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-2xl font-black text-slate-800">Nova Refeição</h3>
            <button (click)="closeMealModal()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200 transition-colors font-bold">✕</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div (click)="fileInput.click()" class="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:border-emerald-300 hover:bg-emerald-50 transition-all overflow-hidden relative group">
                <img *ngIf="imagemRefeicao()" [src]="imagemRefeicao()" class="absolute inset-0 w-full h-full object-cover">
                <div *ngIf="!imagemRefeicao()" class="text-center p-4">
                    <span class="text-4xl mb-2 block">📸</span>
                    <span class="text-[10px] text-slate-400 font-black uppercase tracking-widest group-hover:text-emerald-500 transition-colors">Adicionar Foto</span>
                </div>
                <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden">
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Tipo</label>
                        <select [(ngModel)]="tipoRefeicao" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                            <option value="1">Café da Manhã</option>
                            <option value="2">Almoço</option>
                            <option value="3">Jantar</option>
                            <option value="4">Lanche</option>
                            <option value="5">Gula/Extra</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Data</label>
                        <input type="date" [(ngModel)]="dataRefeicao" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Peso (g)</label>
                    <input type="number" [(ngModel)]="pesoRefeicao" placeholder="Ex: 450" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none">
                </div>
                <input type="text" [(ngModel)]="apelidoRefeicao" placeholder="Apelido (Opcional)" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none">

                <button (click)="salvarRefeicao()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-emerald-200 transition-all active:scale-[0.98]">
                    Enviar Refeição
                </button>
            </div>
        </div>
    </div>
</div>
}
