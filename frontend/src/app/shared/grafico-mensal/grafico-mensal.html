<div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 w-full h-full flex flex-col animate-fade-in">
    <div class="flex justify-between items-center mb-8 shrink-0">
        <h3 class="font-black text-slate-800 text-lg">
            {{ tipoVisualizacao() === 'liquido' ? 'Saldo Mensal' : 'Desempenho Mensal' }}
        </h3>
        <div class="flex items-center space-x-4 text-[10px] font-bold text-slate-400">
            <span class="flex items-center"><div class="w-3 h-3 rounded-md mr-2" [ngClass]="tipoVisualizacao() === 'gasto' ? 'bg-orange-400' : 'bg-emerald-400'"></div> {{ tipoVisualizacao() === 'gasto' ? 'Gasto' : 'Na Meta' }}</span>
            <span class="flex items-center" *ngIf="tipoVisualizacao() !== 'gasto'"><div class="w-3 h-3 rounded-md mr-2 bg-rose-400"></div> Acima da Meta</span>
        </div>
    </div>
    <div class="flex-1 overflow-y-auto pr-4 space-y-4 custom-scrollbar">
        @for (day of dados(); track day.data) {
        <div class="flex items-center space-x-4">
            <span class="w-12 text-slate-400 font-bold text-[10px]">DIA {{ day.legenda }}</span>
            <div class="flex-1 bg-slate-100 rounded-full h-3 overflow-hidden">
                <div class="h-full rounded-full transition-all duration-500"
                     [ngClass]="obterCor(day)"
                     [style.width]="obterLargura(day)"></div>
            </div>
            <span class="w-16 text-right font-black text-slate-700 text-xs">{{ obterValor(day) }} <span class="text-[8px] text-slate-400">kcal</span></span>
        </div>
        }
    </div>
</div>
