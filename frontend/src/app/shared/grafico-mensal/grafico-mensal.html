<div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 w-full animate-fade-in">
    <div class="flex justify-between items-center mb-8">
        <h3 class="font-black text-slate-800 text-lg">Desempenho Mensal</h3>
        <div class="flex items-center space-x-4 text-[10px] font-bold text-slate-400">
            <span class="flex items-center"><div class="w-3 h-3 rounded-md bg-emerald-400 mr-2"></div> Na Meta</span>
            <span class="flex items-center"><div class="w-3 h-3 rounded-md bg-rose-400 mr-2"></div> Acima</span>
        </div>
    </div>
    <div class="max-h-96 overflow-y-auto pr-4 space-y-4 custom-scrollbar">
        @for (day of dados(); track day.label) {
        <div class="flex items-center space-x-4">
            <span class="w-12 text-slate-400 font-bold text-[10px]">DIA {{ day.label }}</span>
            <div class="flex-1 bg-slate-100 rounded-full h-3 overflow-hidden">
                <div class="h-full rounded-full transition-all duration-500"
                     [class]="day.kcal > meta() ? 'bg-rose-400' : 'bg-emerald-400'"
                     [style.width]="(day.kcal / 3000 * 100) + '%'"></div>
            </div>
            <span class="w-16 text-right font-black text-slate-700 text-xs">{{ day.kcal }} <span class="text-[8px] text-slate-400">kcal</span></span>
        </div>
        }
    </div>
</div>
