<div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col justify-center items-center text-center space-y-4 h-full relative overflow-hidden">
  
  <ng-container *ngIf="veredito(); else semDados">
    <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center text-3xl shadow-sm">
      {{ veredito()!.icone }}
    </div>
    <div>
      <h4 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-1">
        {{ veredito()!.titulo }}
      </h4>
      <p class="text-slate-500 text-xs leading-relaxed px-4">
        {{ veredito()!.descricao }}
      </p>
    </div>
    <div [class]="'px-6 py-2 rounded-full font-black text-[10px] uppercase tracking-tighter ' + veredito()!.corCss">
      Veredito do Período
    </div>
  </ng-container>

  <ng-template #semDados>
    <div class="flex flex-col items-center justify-center w-full space-y-2 py-8 opacity-40">
        <span class="text-4xl">⚖️</span>
        <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Aguardando registros</p>
    </div>
  </ng-template>

</div>
