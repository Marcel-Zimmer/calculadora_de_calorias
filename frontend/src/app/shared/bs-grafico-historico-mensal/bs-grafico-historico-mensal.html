<div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col md:p-8">
    <h3 class="font-black text-slate-800 mb-6 text-lg tracking-tight">{{ titulo() }}</h3>
    <div class="grid grid-cols-3 gap-2 md:grid-cols-4 md:gap-3 lg:grid-cols-5">
        @for (dia of dados(); track dia.legenda) {
            <div class="flex flex-col p-2 bg-slate-50 rounded-xl border border-slate-100 transition-all hover:bg-white hover:shadow-md group">
                <span class="text-[8px] font-black text-slate-400 uppercase mb-0.5">Dia {{ dia.legenda }}</span>
                <p class="text-xs font-black transition-colors" [ngClass]="obterClasseCor(dia.valor)">
                    {{ dia.valor }}
                    <span class="text-[8px] font-bold opacity-60">kcal</span>
                </p>
            </div>
        }
    </div>
</div>
