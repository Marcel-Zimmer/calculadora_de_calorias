<button 
  (click)="ui.toggleMenu()" 
  class="fixed top-4 left-4 z-40 lg:hidden p-2.5 bg-white border border-slate-200 rounded-lg shadow-sm flex flex-col justify-center gap-1.5 hover:bg-slate-50 transition-colors">
  
  <span class="block w-6 h-0.5 bg-slate-600 rounded-full"></span>
  <span class="block w-6 h-0.5 bg-slate-600 rounded-full"></span>
  <span class="block w-6 h-0.5 bg-slate-600 rounded-full"></span>

</button>
<aside 
  [ngClass]="ui.menuAberto() ? 'translate-x-0' : '-translate-x-full'"
  class="fixed inset-y-0 left-0 z-[999] w-72 bg-white shadow-2xl lg:shadow-none lg:border-r lg:border-slate-100 transform lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
        

        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 lg:bg-white">
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center font-black text-xl">M</div>
            <h2 class="text-lg font-black text-slate-800">Marcel</h2>
          </div>
          <button (click)="ui.fecharMenu()" class="p-2 lg:hidden text-slate-400 hover:bg-slate-200 rounded-full">✕</button>
        </div>
        
        <nav class="flex-1 p-4 space-y-2">
           <div class="text-[10px] font-bold text-slate-400 uppercase px-4 mb-2 tracking-widest">Menu Principal</div>
           
           <button (click)="selecionarAba('dashboard')" 
                   [class]="abaAtiva() === 'dashboard' ? 'bg-emerald-50 text-emerald-700 font-bold' : 'text-slate-600 hover:bg-slate-50'"
                   class="w-full text-left px-4 py-3 rounded-xl transition-all flex items-center space-x-3">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
              <span>Dashboard</span>
           </button>
           
           <button (click)="selecionarAba('estatisticas')" 
                   [class]="abaAtiva() === 'estatisticas' ? 'bg-emerald-50 text-emerald-700 font-bold' : 'text-slate-600 hover:bg-slate-50'"
                   class="w-full text-left px-4 py-3 rounded-xl transition-all flex items-center space-x-3">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2-2z"></path></svg>
              <span>Estatísticas</span>
           </button>
           
           <button (click)="selecionarAba('perfil')" 
                   [class]="abaAtiva() === 'perfil' ? 'bg-emerald-50 text-emerald-700 font-bold' : 'text-slate-600 hover:bg-slate-50'"
                   class="w-full text-left px-4 py-3 rounded-xl transition-all flex items-center space-x-3">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
              <span>Perfil</span>
           </button>
        </nav>

        <div class="p-4 border-t border-slate-100">
          <button (click)="logout()"class="w-full px-4 py-3 text-sm font-bold text-rose-500 hover:bg-rose-50 rounded-xl transition-colors flex items-center justify-center space-x-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            <span>Sair</span>
          </button>
        </div>
</aside>
