<div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 w-full h-full flex flex-col animate-fade-in">
    <div class="flex justify-between items-center mb-8 shrink-0">
        <h3 class="font-black text-slate-800 text-lg">
            {{ tipoVisualizacao() === 'liquido' ? 'Saldo de Calorias' : 'Desempenho Semanal' }}
        </h3>
        <div class="flex items-center space-x-4 text-[10px] font-bold text-slate-400" *ngIf="!corOverride()">
            <span class="flex items-center"><div class="w-3 h-3 rounded-md mr-2" [ngClass]="tipoVisualizacao() === 'gasto' ? 'bg-orange-400' : 'bg-emerald-400'"></div> {{ tipoVisualizacao() === 'gasto' ? 'Gasto' : 'Na Meta' }}</span>
            <span class="flex items-center" *ngIf="tipoVisualizacao() !== 'gasto'"><div class="w-3 h-3 rounded-md mr-2 bg-rose-400"></div> Acima da Meta</span>
        </div>
    </div>
    <div class="flex-1 flex items-end justify-between min-h-[14rem] px-2 space-x-4 border-b border-slate-100 pb-4">
        @for (day of dados(); track day.data) {
        <div class="flex-1 flex flex-col items-center group relative h-full justify-end">
            <span class="text-[9px] font-black text-slate-400 mb-1">{{ obterValor(day) > 0 ? obterValor(day) : '' }}</span>
            <div class="w-full rounded-t-xl transition-all duration-300 hover:scale-x-105"
                 [ngClass]="obterCor(day)"
                 [style.height]="obterAltura(day)">
            </div>
            <span class="absolute -bottom-7 text-[10px] font-bold text-slate-400 uppercase">{{ day.legenda.substring(0,3) }}</span>
        </div>
        }
    </div>

</div>
