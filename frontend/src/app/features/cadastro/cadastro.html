<app-carregamento></app-carregamento>
<div class="min-h-screen bg-slate-50 font-sans text-slate-800">

  <div class="min-h-screen flex items-center justify-center p-4 bg-linear-to-br from-emerald-500 to-teal-700 lg:p-8">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden animate-fade-in">

      <div class="p-8 pb-0 text-center">
        <div class="w-20 h-20 mx-auto mb-4 shadow-inner rounded-2xl overflow-hidden flex items-center justify-center">
          <img src="gif.gif" alt="Logo" class="w-full h-full object-cover">
        </div>
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">
          CRIAR CONTA
        </h1>
        <!-- Stepper Indicator -->
        <div class="flex justify-center items-center mt-4 space-x-2">
          <div class="h-1.5 w-8 rounded-full" [class.bg-emerald-600]="passo() >= 1" [class.bg-slate-200]="passo() < 1"></div>
          <div class="h-1.5 w-8 rounded-full" [class.bg-emerald-600]="passo() >= 2" [class.bg-slate-200]="passo() < 2"></div>
          <div class="h-1.5 w-8 rounded-full" [class.bg-emerald-600]="passo() >= 3" [class.bg-slate-200]="passo() < 3"></div>
        </div>
      </div>

      <div class="p-8 space-y-4">

        <!-- Passo 1: Informações da Conta -->
        @if (passo() === 1) {
          <div class="animate-fade-in space-y-4">
            <h2 class="text-xs font-bold text-emerald-600 uppercase tracking-widest text-center mb-6">Informações da Conta</h2>
            
            <div class="space-y-1">
              <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Nome Completo</label>
              <input type="text" placeholder="João Silva" [(ngModel)]="nome"
                class="w-full bg-slate-50 border border-slate-400 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">E-mail</label>
              <input type="email" placeholder="exemplo@email.com" [(ngModel)]="email"
                class="w-full bg-slate-50 border border-slate-400 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Senha</label>
              <input type="password" placeholder="••••••••" [(ngModel)]="senha"
                class="w-full bg-slate-50 border border-slate-400 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Confirmar Senha</label>
              <input type="password" placeholder="••••••••" [(ngModel)]="confirmarSenha"
                class="w-full bg-slate-50 border border-slate-400 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
            </div>
          </div>
        }

        <!-- Passo 2: Perfil Biométrico -->
        @if (passo() === 2) {
          <div class="animate-fade-in space-y-4">
            <h2 class="text-xs font-bold text-emerald-600 uppercase tracking-widest text-center mb-6">Sobre Você</h2>
            
            <div class="space-y-1">
              <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Data de Nascimento</label>
              <input type="date" [(ngModel)]="dataNascimento"
                class="w-full bg-slate-50 border border-slate-400 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Gênero</label>
              <select [(ngModel)]="genero"
                class="w-full bg-slate-50 border border-slate-400 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all appearance-none">
                <option [value]="1">Masculino</option>
                <option [value]="2">Feminino</option>
              </select>
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Altura (cm)</label>
              <input type="number" placeholder="175" [(ngModel)]="altura"
                class="w-full bg-slate-50 border border-slate-400 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
            </div>
          </div>
        }

        <!-- Passo 3: Metas e Peso -->
        @if (passo() === 3) {
          <div class="animate-fade-in space-y-4">
            <h2 class="text-xs font-bold text-emerald-600 uppercase tracking-widest text-center mb-6">Metas e Peso</h2>
            
            <div class="grid grid-cols-2 gap-4">
              <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Peso Atual (kg)</label>
                <input type="number" placeholder="70.5" [(ngModel)]="peso"
                  class="w-full bg-slate-50 border border-slate-400 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
              </div>
              <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Meta Calorias (opcional)</label>
                <input type="number" placeholder="2000" [(ngModel)]="metaCalorica"
                  class="w-full bg-slate-50 border border-slate-400 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
              </div>
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Nível de Atividade</label>
              <select [(ngModel)]="nivelAtividade"
                class="w-full bg-slate-50 border border-slate-400 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all appearance-none">
                <option [value]="1">Sedentário (pouco ou nenhum exercício)</option>
                <option [value]="2">Levemente Ativo (exercício leve 1-3 dias/semana)</option>
                <option [value]="3">Moderadamente Ativo (exercício moderado 3-5 dias/semana)</option>
                <option [value]="4">Muito Ativo (exercício pesado 6-7 dias/semana)</option>
                <option [value]="5">Extremamente Ativo (atleta ou trabalho físico pesado)</option>
              </select>
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Objetivo</label>
              <select [(ngModel)]="objetivo"
                class="w-full bg-slate-50 border border-slate-400 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all appearance-none">
                <option [value]="1">Perda de Peso Agressiva</option>
                <option [value]="2">Perda de Peso Leve</option>
                <option [value]="3">Manter Peso</option>
              </select>
            </div>
          </div>
        }

        @if (mensagemErro()) {
          <div class="bg-rose-50 border-l-4 border-rose-500 p-4 rounded-xl animate-fade-in shadow-sm">
            <p class="text-xs font-bold text-rose-700">{{ mensagemErro() }}</p>
          </div>
        }

        <div class="flex gap-4 mt-6">
          @if (passo() > 1) {
            <button (click)="passoAnterior()"
              class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-4 rounded-2xl font-black text-lg transition-all active:scale-[0.98]">
              Voltar
            </button>
          }
          
          @if (passo() < 3) {
            <button (click)="proximoPasso()"
              class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-black text-lg transition-all active:scale-[0.98]">
              Próximo
            </button>
          } @else {
            <button (click)="finalizarCadastro()"
              class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-black text-lg transition-all active:scale-[0.98]">
              Finalizar
            </button>
          }
        </div>

        <div class="pt-6 text-center border-t border-slate-50">
          <p class="text-sm text-slate-500">
            Já tem uma conta?
            <button (click)="voltarLogin()" class="text-emerald-600 font-bold hover:underline ml-1">
              Fazer Login
            </button>
          </p>
        </div>

      </div>
    </div>
  </div>
</div>
