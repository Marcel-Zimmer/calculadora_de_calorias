  
  <div class="min-h-screen bg-slate-50 font-sans text-slate-800">
      
        <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-emerald-500 to-teal-700 lg:p-8">
          <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden animate-fade-in">
            
            <!-- Cabeçalho do Login -->
            <div class="p-8 pb-0 text-center">
              <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">
                🥗
              </div>
              <h1 class="text-3xl font-black text-slate-800 tracking-tight">
                {{ authMode() === 'login' ? 'Bem-vindo!' : 'Criar Conta' }}
              </h1>
            </div>

            <div class="p-8 space-y-4">

              <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">E-mail</label>
                <input type="email" placeholder="exemplo@email.com" [(ngModel)]="email" (keyup.enter)="login()"
                  class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
              </div>

              <div class="space-y-1">
                <div class="flex justify-between items-center px-1">
                  <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Senha</label>
                  @if (authMode() === 'login') {
                    <button class="text-[10px] font-bold text-emerald-600 hover:underline">Recuperar-login?</button>
                  }
                </div>
                <input type="password" placeholder="••••••••" [(ngModel)]="senha" (keyup.enter)="login()"
                  class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
              </div>

              @if (authMode() === 'signup') {
                <div class="space-y-1 animate-fade-in">
                  <label class="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-widest">Confirmar Palavra-passe</label>
                  <input type="password" placeholder="••••••••" 
                    class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
                </div>
              }
              @if (mensagemErro()) {
                <div class="bg-rose-50 border-l-4 border-rose-500 p-4 rounded-xl animate-fade-in shadow-sm">
                  <div class="flex items-center">
                    <span class="text-rose-500 mr-2 text-lg"></span>
                    <p class="text-xs font-bold text-rose-700">{{ mensagemErro() }}</p>
                  </div>
                </div>
              }

              <button (click)="login()" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-emerald-200 transition-all active:scale-[0.98] mt-4">
                {{ authMode() === 'login' ? 'Entrar' : 'Registar' }}
              </button>

              <div class="pt-6 text-center border-t border-slate-50">
                <p class="text-sm text-slate-500">
                  {{ authMode() === 'login' ? 'Primeira vez?' : 'Já tem uma conta?' }}
                  <button (click)="toggleAuthMode()" class="text-emerald-600 font-bold hover:underline ml-1">
                    {{ authMode() === 'login' ? 'Registar-se' : 'Fazer login' }}
                  </button>
                </p>
              </div>
            </div>
          </div>
        </div>
    </div>
