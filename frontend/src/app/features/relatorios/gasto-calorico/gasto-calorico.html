<div class="animate-fade-in space-y-6">
  <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-2">
    <h2 class="text-xl font-black text-slate-800">Relatório de Gasto</h2>
    <div class="flex bg-slate-200/50 p-1 rounded-2xl w-full md:w-auto">
      <button (click)="alterarPeriodo('semanal')" [class]="periodoEstatisticas() === 'semanal' ? 'bg-white shadow-sm text-emerald-600 font-bold' : 'text-slate-500'" class="flex-1 md:px-6 py-2 text-xs rounded-xl transition-all uppercase tracking-widest">Semana</button>
      <button (click)="alterarPeriodo('mensal')" [class]="periodoEstatisticas() === 'mensal' ? 'bg-white shadow-sm text-emerald-600 font-bold' : 'text-slate-500'" class="flex-1 md:px-6 py-2 text-xs rounded-xl transition-all uppercase tracking-widest">Mês</button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4" *ngIf="dadosEstatisticas()">
    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 flex flex-col justify-center">
      <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total</p>
      <p class="text-3xl font-black text-indigo-500">{{ dadosEstatisticas()!.totalGasto.toFixed(0) }} kcal</p>
    </div>
    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 flex flex-col justify-center">
      <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Ativos</p>
      <p class="text-2xl font-black text-slate-800">{{ insightsGasto()?.diasAtivos }} dias</p>
    </div>
    <app-bs-card-maior-gasto 
      [maiorGasto]="(periodoEstatisticas() === 'semanal' ? (insightsGasto()?.maiorGasto || 0) : (dadosEstatisticas()!.gastoInsights?.maiorGasto || 0))" 
      [diaMaiorGasto]="(periodoEstatisticas() === 'semanal' ? (insightsGasto()?.diaMaiorGasto || '-') : (dadosEstatisticas()!.gastoInsights?.diaMaiorGasto || '-'))">
    </app-bs-card-maior-gasto>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" *ngIf="periodoEstatisticas() === 'mensal' && dadosEstatisticas()?.gastoInsights">
    <app-bs-grafico-media-por-semana titulo="Média Queima Semanal" corBarra="bg-orange-400" [semanas]="dadosEstatisticas()!.gastoInsights!.mediasSemanais"></app-bs-grafico-media-por-semana>
    <app-bs-grafico-maiores-consumos titulo="Recordes de Queima" corBarra="bg-orange-400" [picos]="dadosEstatisticas()!.gastoInsights!.topGasto" [maximo]="dadosEstatisticas()!.gastoInsights!.maiorGasto"></app-bs-grafico-maiores-consumos>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6" *ngIf="dadosEstatisticas()">
    <div class="lg:col-span-2">
      <app-bs-grafico-media-semanal *ngIf="periodoEstatisticas() === 'semanal'" titulo="Gasto Semanal" [dados]="dadosHistoricoGasto()" corPadrao="bg-indigo-500"></app-bs-grafico-media-semanal>
      <app-bs-grafico-historico-mensal *ngIf="periodoEstatisticas() === 'mensal'" titulo="Histórico Queima" [dados]="dadosHistoricoGasto()" [pintarPorMeta]="false"></app-bs-grafico-historico-mensal>
    </div>
    <div class="lg:col-span-1">
      <app-bs-grafico-distribuicao-itens titulo="Esforço" [itens]="dadosEstatisticas()!.distribuicaoExercicios" corPrincipal="bg-orange-500"></app-bs-grafico-distribuicao-itens>
    </div>
  </div>
</div>
